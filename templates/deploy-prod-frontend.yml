name: Deploy Prod Frontend

on:
  push:
    branches: ["main"]
    paths:
      - "<<FRONTEND_DIR>>/**"

  workflow_dispatch:

jobs:
  build-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: <<FRONTEND_DIR>>
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Detect package manager
        id: detect-package-manager
        run: |
          # TODO: replace <<FRONTEND_DIR>> below with the same value used above
          if [ -f "${{ github.workspace }}/<<FRONTEND_DIR>>/yarn.lock" ]; then
            echo "manager=yarn" >> $GITHUB_OUTPUT
            echo "command=install" >> $GITHUB_OUTPUT
            echo "runner=yarn" >> $GITHUB_OUTPUT
            exit 0
          elif [ -f "${{ github.workspace }}/<<FRONTEND_DIR>>/package.json" ]; then
            echo "manager=npm" >> $GITHUB_OUTPUT
            echo "command=ci" >> $GITHUB_OUTPUT
            echo "runner=npx --no-install" >> $GITHUB_OUTPUT
            exit 0
          else
            echo "Unable to determine package manager" >&2
            exit 1
          fi
      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: "20"
          cache: ${{ steps.detect-package-manager.outputs.manager }}
          cache-dependency-path: "**/package-lock.json"
      - name: Restore cache
        uses: actions/cache@v3
        with:
          path: |
            <<FRONTEND_DIR>>/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json', '**/yarn.lock') }}-${{ hashFiles('**.[jt]s', '**.[jt]sx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json', '**/yarn.lock') }}-
      - name: Install dependencies
        run: ${{ steps.detect-package-manager.outputs.manager }} ${{ steps.detect-package-manager.outputs.command }}
      - name: Build with Next.js
        run: npm run build

  build_and_deploy_job:
    needs: build-frontend
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          lfs: false
      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.<<AZURE_STATIC_WEB_APPS_API_TOKEN_SECRET>> }}
          repo_token: ${{ secrets.GITHUB_TOKEN }} 
          action: "upload"
          app_location: "./<<FRONTEND_DIR>>" 
          api_location: "" 
          output_location: ""
        env:
          NEXT_PUBLIC_ENVIRONMENT: production
          # NEXT_PUBLIC_API: ${{ secrets.NEXT_PUBLIC_PROD_API }}
          # NEXT_PUBLIC_CLIENT_ID: ${{ secrets.NEXT_PUBLIC_PROD_CLIENT_ID }}

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.<<AZURE_STATIC_WEB_APPS_API_TOKEN_SECRET>> }}
          action: "close"
