name: Deploy and Load Test

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Deploy to Azure App Service
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Log in to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: my-app        
          package: .

# run load test against the deployed app.
  load-test:
    name: Azure Load Test
    runs-on: ubuntu-latest
    needs: deploy   

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Run Azure Load Test
        uses: azure/load-testing@v1
        with:
          loadtestConfigFile: test-config.yaml
          loadtestResource: load-testing
          resourceGroup: name-rg

          env: |
            [
              {
                "name": "webapp",
                "value": "my-app.azurewebsites.net"
              }
            ]

          secrets: |
            [
              {
                "name": "appToken",
                "value": "${{ secrets.API_TOKEN }}"
              }
            ]

      - name: Upload load test results
        uses: actions/upload-artifact@v4
        if: always()    
        with:
          name: load-test-results
          path: ${{ github.workspace }}/loadTest
